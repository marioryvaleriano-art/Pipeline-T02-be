  # docker-compose -f docker-compose-sqlserver.yml up -d
 # docker-compose -f docker-compose-db.yml down

version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest    # image: juan321/sql-server:2022   # cambiar por tu usuario de dockerhub si quieres usar una imagen personal
    container_name: sqlserver-db
    environment:
      SA_PASSWORD: "Angel12345!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql  # para que no se borren los datos
      #networks:
      #- my-network
    restart: unless-stopped
# CREAR UNA RED EN ESTE COMPOSE PARA QUE SEA COMPARTIDA
  #networks:
    #my-network:
    # name: my-network   # red compartida, visible desde ambos compose
    # driver: bridge

volumes:
  sqlserver_data:
