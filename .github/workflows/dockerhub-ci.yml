name: Docker Hub

on:
  push:
    branches:
      - main
      - develop # puedes añadir más ramas
  pull_request:
    branches:
      - main
      - develop # puedes añadir más ramas
  schedule:
    # Ejecutar todos los días a las 8:00 AM hora Perú (UTC-5) → 1:00 PM UTC
    - cron: '0 13 * * *'
  workflow_dispatch:  # Permite ejecución manual desde GitHub Actions UI

jobs:
  dockerhub:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout del código
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Login a Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_NOMBRE }}
          password: ${{ secrets.DOCKERHUB_TOKEN_NOMBRE }}

      # 3. Build y Push con tags latest y SHA
      - name: Build and Push Docker Image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile-angel/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME_NOMBRE }}/pipeline-t02-be:latest
            ${{ secrets.DOCKERHUB_USERNAME_NOMBRE }}/pipeline-t02-be:${{ github.sha }}