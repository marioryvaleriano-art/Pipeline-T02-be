name: DockerHub CI

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_NOMBRE }}
          password: ${{ secrets.DOCKERHUB_TOKEN_NOMBRE }}

      - name: Build Docker image
        run: docker build -t mariory/pipeline-t02-be:latest -f dockerfile-juan/Dockerfile .

      - name: Push Docker image
        run: docker push mariory/pipeline-t02-be:latest
