services:
  # Servicio de la Base de Datos
  sqlserver_db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=TuPasswordFuerte123!
    ports:
      - "1434:1433"

  # Servicio de tu aplicación Spring Boot (Backend)
  warehouse-backend:
    build: .
    container_name: warehouse-backend-app
    ports:
      - "8082:8082"
    depends_on:
      - sqlserver_db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver_db:1433;databaseName=master;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=TuPasswordFuerte123!
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update