version: '3.8'

services:
  backend:
    image: sebastianalvareztito/api-bodega:v2
    container_name: api_peirano
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://database:1433;databaseName=BodegaPeiranoDB;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=YourStrong@Password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    networks:
      - bodega-network
    # SE ELIMINÓ EL DEPENDS_ON DE AQUÍ

networks:
  bodega-network:
    external: true