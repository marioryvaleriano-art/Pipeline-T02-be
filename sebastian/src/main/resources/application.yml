spring:
  datasource:
    # Asegúrate de que 'sql_server_peirano' sea exactamente el nombre 
    # de tu contenedor de SQL Server según tu docker-compose.
    url: jdbc:sqlserver://sql_server_peirano:1433;databaseName=BodegaPeiranoDB;encrypt=false;trustServerCertificate=true
    username: sa
    password: YourStrong@Password
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServer2012Dialect
    
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: dd/MM/yyyy HH:mm:ss

server:
  port: 8085

# Configuración adicional para que el backend acepte peticiones desde tu Angular
springdoc:
  api-docs:
    path: /api-docs