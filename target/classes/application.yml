# ============================================
# CONFIGURACIÓN PRINCIPAL - BACKEND
# ============================================

spring:
  # ============================================
  # CONFIGURACIÓN DE BASE DE DATOS
  # ============================================
  datasource:
    url: ${DATABASE_URL:jdbc:sqlserver://localhost:1433;databaseName=BodegaPeiranoDBF;encrypt=false;trustServerCertificate=true}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:Angel12345!}
    driver-class-name: ${DATABASE_DRIVER:com.microsoft.sqlserver.jdbc.SQLServerDriver}
  
  # ============================================
  # CONFIGURACIÓN DE JPA / HIBERNATE
  # ============================================
  jpa:
    hibernate:
      ddl-auto: update          # Actualiza esquema automáticamente (solo desarrollo)
    show-sql: true              # Muestra consultas SQL en consola
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServer2012Dialect   # Dialecto para SQL Server
  
  # ============================================
  # CONFIGURACIÓN DE JACKSON (JSON)
  # ============================================
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: dd/MM/yyyy HH:mm:ss

# ============================================
# CONFIGURACIÓN DEL SERVIDOR
# ============================================
server:
  port: ${PORT:8085}  # Valor por defecto si PORT no está configurado

# ============================================
# CONFIGURACIÓN DE SPRINGDOC / SWAGGER
# ============================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html # Ruta para acceder a Swagger UI: http://localhost:8085/swagger-ui.html

# ============================================
# CONFIGURACIÓN DE CORS (comentada - se maneja por variables de entorno)
# ============================================
# CORS - Se leen desde variables de entorno definidas en docker-compose
  #cors:
  #allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}