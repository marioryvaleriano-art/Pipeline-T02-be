spring:
  datasource:
    url: ${DATABASE_URL:jdbc:sqlserver://localhost:1433;databaseName=BodegaPeiranoDBF;encrypt=false;trustServerCertificate=true}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:TuPasswordFuerte123!}
    driver-class-name: ${DATABASE_DRIVER:com.microsoft.sqlserver.jdbc.SQLServerDriver}
  #sdas
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServer2012Dialect
    
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: dd/MM/yyyy HH:mm:ss

server:
  port: ${PORT:8085}  # Valor por defecto si PORT no está configurado

# Configuración adicional para que el backend acepte peticiones desde tu Angular
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html # Ruta para acceder a Swagger UI: http://localhost:8085/swagger-ui.html










# CORS - Se leen desde variables de entorno definidas en docker-compose
  #cors:
  #allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200} # Valor por defecto si no se define la variable de entorno